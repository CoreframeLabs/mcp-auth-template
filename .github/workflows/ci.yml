name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Dependency advisories appear after code stops changing, so re-check weekly.
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  verify:
    name: Typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Fails the build on high/critical only. There is one known *moderate*
      # advisory (GHSA-frvp-7c67-39w9) in a transitive @hono/node-server pulled
      # by the MCP SDK: a Windows serve-static path traversal that this project
      # cannot reach, since it serves no static files through Hono. Fixing it
      # would mean downgrading the SDK. Documented in README, revisit on bump.
      - run: npm audit --audit-level=high

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # gitleaks needs history to scan commits, not just the worktree.
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-extended
      - uses: github/codeql-action/analyze@v4
