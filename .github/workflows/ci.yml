name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Dependency advisories appear after code stops changing, so re-check weekly.
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  verify:
    name: Typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Fails the build on high/critical only. There is one known *moderate*
      # advisory (GHSA-frvp-7c67-39w9) in a transitive @hono/node-server pulled
      # by the MCP SDK: a Windows serve-static path traversal that this project
      # cannot reach, since it serves no static files through Hono. Fixing it
      # would mean downgrading the SDK. Documented in README, revisit on bump.
      - run: npm audit --audit-level=high

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # gitleaks scans commits, not just the worktree, so it needs history.
          # A secret that was committed and later removed is still leaked.
          fetch-depth: 0

      # Uses the gitleaks CLI directly rather than gitleaks/gitleaks-action.
      # The action requires a paid licence for GitHub organizations; the scanner
      # itself is MIT and has no such restriction. Same tool, no licence server,
      # and no third-party action handling the repository token.
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          set -euo pipefail
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          base="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          curl -sSfL "${base}/${archive}" -o "${archive}"
          curl -sSfL "${base}/gitleaks_${GITLEAKS_VERSION}_checksums.txt" -o checksums.txt
          # Verify before executing. A security tool fetched over the network is
          # itself a supply-chain step.
          grep " ${archive}\$" checksums.txt | sha256sum -c -
          tar -xzf "${archive}" gitleaks
          # Installed into RUNNER_TEMP rather than /usr/local/bin so the step
          # needs no sudo, and removed from the workspace so it cannot be
          # mistaken for repository content by the scan that follows.
          mkdir -p "${RUNNER_TEMP}/bin"
          install -m 0755 gitleaks "${RUNNER_TEMP}/bin/gitleaks"
          echo "${RUNNER_TEMP}/bin" >> "${GITHUB_PATH}"
          rm -f "${archive}" checksums.txt gitleaks
          "${RUNNER_TEMP}/bin/gitleaks" version

      - name: Scan git history for secrets
        # `detect` was split into `git` and `dir` in gitleaks 8.19; `git` scans
        # the full commit history. --redact keeps any finding out of the public
        # log, which would otherwise leak the very secret it just found.
        run: gitleaks git . --redact --no-banner --exit-code 1

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-extended
      - uses: github/codeql-action/analyze@v4
